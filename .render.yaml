services:
  - type: web
    name: horacerta-web
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "horacerta-web.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://horacerta-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: horacerta-db
          property: connectionString
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: "seu_email@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"

databases:
  - name: horacerta-db
    plan: free
