<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>HoraCerta • Dashboard</title>
</head>
<body>
  <h1>Dashboard</h1>

  {% if header_mode == "company" %}
    <p>Empresa: <b>{{ header_company_name|default:"Empresa" }}</b></p>
  {% else %}
    <p>Logado como: <b>{{ header_display_name|default:"Usuario" }}</b></p>
  {% endif %}

  <p><a href="{% url 'logout' %}">Sair</a></p>
</body>
</html>
