<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>HoraCerta - Redefinicao de senha</title>
</head>
<body style="margin:0;padding:0;background:#0b1220;font-family:Segoe UI,Roboto,Arial,sans-serif;color:#eaf0ff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:92%;background:#111b33;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px;">
          <tr>
            <td>
              <h2 style="margin:0 0 8px;font-size:24px;line-height:1.2;">Redefinicao de senha</h2>
              <p style="margin:0 0 14px;color:#a6b3d6;line-height:1.5;">
                Voce solicitou a troca de senha da sua conta no HoraCerta.
              </p>
              <p style="margin:0 0 16px;">
                <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                   style="display:inline-block;background:#4f7cff;color:#ffffff;text-decoration:none;padding:10px 14px;border-radius:10px;font-weight:700;">
                  Criar nova senha
                </a>
              </p>
              <p style="margin:0;color:#a6b3d6;line-height:1.5;">
                Se voce nao fez essa solicitacao, ignore esta mensagem.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
