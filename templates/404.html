<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada | HoraCerta</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root{--bg:#071125;--panel:#0f1d3a;--line:rgba(255,255,255,.12);--text:#edf4ff;--muted:#9ab0ca;--accent:var(--color-primary)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(900px 420px at 15% -10%, var(--color-primary-soft), transparent 60%),var(--bg);color:var(--text);font-family:Segoe UI,Roboto,Arial,sans-serif;padding:20px}
    .card{width:min(620px,100%);border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,color-mix(in oklab, var(--color-card) 90%, transparent),color-mix(in oklab, var(--color-card) 86%, transparent));padding:22px;box-shadow:0 18px 46px rgba(0,0,0,.35)}
    h1{margin:0;font-size:clamp(1.6rem,5vw,2rem);letter-spacing:-.02em}
    p{margin:10px 0 0;color:var(--muted);line-height:1.5}
    .actions{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:11px;border:1px solid var(--line);text-decoration:none;color:var(--text);font-weight:700}
    a.primary{background:linear-gradient(135deg,var(--accent),var(--color-accent));border:none}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Página não encontrada</h1>
    <p>O endereço acessado não existe ou foi alterado. Você pode voltar para a página inicial pública do HoraCerta.</p>
    <div class="actions">
      <a class="primary" href="/">Ir para a home</a>
      <a href="/login/">Acessar plataforma</a>
    </div>
  </main>
</body>
</html>
