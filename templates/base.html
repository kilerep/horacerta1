<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>{% block title %}HoraCerta{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0b1220; --card:#111b33; --card2:#0f1830;
      --text:#eaf0ff; --muted:#a6b3d6;
      --primary:#4f7cff; --yellow:#facc15;
      --border:rgba(255,255,255,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    a{color:#cfe0ff;text-decoration:none}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    header{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);background:rgba(15,24,48,.7);padding:14px 16px;border-radius:22px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand small{color:var(--muted)}
    .logo-mark{
      width:28px;height:28px;border-radius:10px;position:relative;flex:0 0 auto;
      background:linear-gradient(145deg,var(--primary),#2d5fff);
      border:1px solid rgba(255,255,255,.25);
      box-shadow:0 8px 20px rgba(79,124,255,.35);
    }
    .logo-mark:after{
      content:"";position:absolute;right:-4px;top:-4px;width:10px;height:10px;border-radius:50%;
      background:var(--yellow);border:1px solid rgba(255,255,255,.45);
    }
    .logo-text{display:flex;flex-direction:column;line-height:1}
    .logo-text b{letter-spacing:.2px}
    .nav{display:flex;gap:10px;align-items:center}
    .btn{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:8px 12px;border-radius:14px}
    .btn.primary{background:linear-gradient(180deg,var(--primary),#3b63ff);border:none}
    .grid{display:grid;gap:14px;margin-top:14px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media (max-width: 900px){.cards{grid-template-columns:repeat(2,1fr)}}
    .card{border:1px solid var(--border);border-radius:var(--radius);background:rgba(255,255,255,.05);padding:14px}
    .muted{color:var(--muted)}
    .pill{display:inline-block;font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid var(--border)}
    .pill.warn{border-color:rgba(250,204,21,.45);background:rgba(250,204,21,.12);color:#fff2b3}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left}
    th{color:var(--muted);font-weight:600}
    input{width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <div class="logo-text">
          <b>HoraCerta</b>
          <small>{% block subtitle %}{% endblock %}</small>
        </div>
      </div>
      <div class="nav">
        <a class="btn" href="{% url 'help' %}">Ajuda</a>
        <a class="btn" href="{% url 'terms' %}">Termos</a>
        {% if request.user.is_authenticated %}
          <span class="pill">{{ request.user.email|default:request.user.username }}</span>
          <a class="btn" href="{% url 'logout' %}">Sair</a>
        {% endif %}
      </div>
    </header>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
