name: Django CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-secret-key-not-for-production
      DEBUG: "False"
      APP_BASE_URL: https://horacertagestao.com.br
      USE_CONSOLE_EMAIL: "True"
      DATABASE_URL: sqlite:///db.sqlite3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Django configuration
        run: python manage.py check

      - name: Validate migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          python manage.py test 2>&1 | tee django-test-output.log

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-output
          path: django-test-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run deployment checks
        run: python manage.py check --deploy
